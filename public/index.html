<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pick One</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <div class="brand-lockup" aria-label="Pick One">
          <div class="brand-mark">P1</div>
          <div>
            <h1>Pick One</h1>
          </div>
        </div>
        <div class="account-panel">
          <label>
            <span id="language-label">Language</span>
            <select id="locale-select" aria-label="Language">
              <option value="ko">한국어</option>
              <option value="en">English</option>
            </select>
          </label>
          <label>
            <span id="account-label">Account</span>
            <select id="user-select"></select>
          </label>
          <button id="profile-button" type="button" data-profile-open aria-controls="profile-panel" aria-expanded="false">Profile</button>
          <form id="signup-form" class="signup-form">
            <input id="signup-handle" name="handle" autocomplete="off" placeholder="new handle">
            <button id="signup-button" type="submit">Sign up</button>
          </form>
          <div id="oauth-buttons" class="oauth-buttons" aria-label="Social login"></div>
        </div>
      </header>

      <main class="workspace">
        <nav class="view-tabs" aria-label="Primary views">
          <button id="topics-view-button" type="button" data-view="topics">Topics</button>
          <button id="activity-view-button" type="button" data-view="activity">Activity</button>
        </nav>
        <aside class="rail">
          <section>
            <div id="topics-title" class="section-title">Topics</div>
            <div id="topic-list" class="topic-list"></div>
          </section>
        </aside>

        <section id="topic-detail" class="topic-detail"></section>
        <section id="activity-view" class="activity-view" hidden></section>
      </main>
    </div>

    <div id="profile-backdrop" class="profile-backdrop" data-profile-close hidden></div>
    <aside id="profile-panel" class="profile-panel" role="dialog" aria-modal="true" aria-labelledby="profile-title" tabindex="-1" hidden></aside>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
